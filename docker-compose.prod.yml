services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lovitask-backend-prod
    restart: always
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - APP_ENV=production
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - DB_PATH=/app/data/lovitask.db
      - DEBUG_MODE=false
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    volumes:
      - lovitask-data-prod:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lovitask-network-prod
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lovitask-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - lovitask-network-prod

volumes:
  lovitask-data-prod:

networks:
  lovitask-network-prod:
    driver: bridge
