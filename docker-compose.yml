services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT}:5000"
    environment:
      - APP_ENV=${APP_ENV}
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - ASPNETCORE_URLS=http://+:5000
      - DB_PATH=${DB_PATH}
      - DEBUG_MODE=${DEBUG_MODE}
    volumes:
      - lovitask-data:/app/data

volumes:
  lovitask-data:
