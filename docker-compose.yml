services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lovitask-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT}:5000"
    environment:
      - APP_ENV=${APP_ENV}
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - ASPNETCORE_URLS=http://+:5000
      - DB_PATH=${DB_PATH}
      - DEBUG_MODE=${DEBUG_MODE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - lovitask-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lovitask-network
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lovitask-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - lovitask-network

volumes:
  lovitask-data:

networks:
  lovitask-network:
    driver: bridge
