<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>
  </defs>
  <!-- Background shape (Squircle) -->
  <rect x="10" y="10" width="80" height="80" rx="22" fill="url(#grad)" />
  <!-- Brain symbol / Cognitive nodes in white/semi-transparent -->
  <!-- Left hemisphere of the brain -->
  <path d="M46 30 C36 30, 26 35, 26 48 C26 58, 33 60, 36 65 C39 70, 44 72, 46 72 Z" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  <!-- Right hemisphere of the brain -->
  <path d="M54 30 C64 30, 74 35, 74 48 C74 58, 67 60, 64 65 C61 70, 56 72, 54 72 Z" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  <!-- Central stem / Connection -->
  <path d="M50 30 L50 72" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <!-- Brain folds / Neural path lines -->
  <path d="M34 45 C38 45, 42 42, 44 48" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  <path d="M66 45 C62 45, 58 42, 56 48" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  <path d="M32 55 C38 55, 40 58, 45 57" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  <path d="M68 55 C62 55, 60 58, 55 57" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />
  
  <!-- Neural Nodes (Circles representing ideas/tasks being organized) -->
  <circle cx="50" cy="30" r="4.5" fill="#FFFFFF" />
  <circle cx="34" cy="45" r="3.5" fill="#FFFFFF" />
  <circle cx="66" cy="45" r="3.5" fill="#FFFFFF" />
  <circle cx="45" cy="57" r="3" fill="#FFFFFF" />
  <circle cx="55" cy="57" r="3" fill="#FFFFFF" />
  
  <!-- Sparkles / Assistente Cognitivo Adaptativo -->
  <path d="M50 15 L51.5 18 L55 18.5 L52 21 L53 24.5 L50 22.5 L47 24.5 L48 21 L45 18.5 L48.5 18 Z" fill="#FFE600" transform="translate(18, 5) scale(0.6)" />
  <path d="M50 15 L51.5 18 L55 18.5 L52 21 L53 24.5 L50 22.5 L47 24.5 L48 21 L45 18.5 L48.5 18 Z" fill="#FFE600" transform="translate(-25, 20) scale(0.5)" />
</svg>
